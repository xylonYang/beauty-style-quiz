<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照照镜子测试 | LookMirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; overflow-x: hidden; color: #fff; }
    .page { display: none; min-height: 100vh; position: relative; }
    .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite; }
    .orb1 { width: 300px; height: 300px; background: #ff6b9d; top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 250px; height: 250px; background: #c44cff; bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: #ffd93d; top: 50%; left: 50%; animation-delay: 1.5s; }
    @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }
    #page-start { text-align: center; z-index: 1; }
    .hero-emoji { font-size: 80px; margin-bottom: 20px; animation: bounce 2s ease-in-out infinite; display: block; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    #page-start h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #ff6b9d, #ffd93d, #c44cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .subtitle { font-size: 1rem; color: rgba(255,255,255,0.5); margin-bottom: 40px; letter-spacing: 4px; }
    .desc { max-width: 360px; margin: 0 auto 40px; font-size: 0.95rem; color: rgba(255,255,255,0.7); line-height: 1.8; }
    .btn-start { background: linear-gradient(135deg, #ff6b9d, #c44cff); border: none; color: #fff; font-size: 1.1rem; font-weight: 700; padding: 16px 48px; border-radius: 50px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
    .btn-start:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(196,76,255,0.5); }
    #page-question { z-index: 1; padding: 20px; }
    .progress-bar { width: 100%; max-width: 500px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 50px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ff6b9d, #c44cff); border-radius: 2px; transition: width 0.5s ease; }
    .question-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px 36px; max-width: 500px; width: 100%; text-align: center; backdrop-filter: blur(20px); }
    .question-num { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 16px; letter-spacing: 2px; }
    .question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.6; margin-bottom: 36px; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); padding: 14px 20px; border-radius: 14px; font-size: 0.95rem; cursor: pointer; transition: all 0.25s; text-align: left; }
    .option-btn:hover { background: rgba(255,107,157,0.15); border-color: rgba(255,107,157,0.4); transform: translateX(4px); }
    .option-btn:active { transform: scale(0.98); }
    #page-result { z-index: 1; padding: 20px; }
    .result-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 40px 32px; max-width: 480px; width: 100%; text-align: center; backdrop-filter: blur(20px); position: relative; overflow: hidden; }
    .result-card::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(135deg, #ff6b9d, #ffd93d, #c44cff, #6bfff0); border-radius: 30px; z-index: -1; animation: borderRotate 4s linear infinite; }
    @keyframes borderRotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .result-badge { display: inline-block; background: linear-gradient(135deg, #ff6b9d, #c44cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 0.75rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 20px; border: 1px solid rgba(255,107,157,0.3); padding: 6px 16px; border-radius: 20px; }
    .result-type { font-size: 2.2rem; font-weight: 800; margin-bottom: 6px; }
    .result-title { font-size: 1rem; color: rgba(255,255,255,0.5); margin-bottom: 32px; }
    .result-portrait { width: 160px; height: 160px; margin: 0 auto 32px; position: relative; display: flex; align-items: center; justify-content: center; }
    .result-portrait img { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); box-shadow: 0 0 30px rgba(196,76,255,0.3); }
    .avatar-ring { position: absolute; border-radius: 50%; border: 3px solid transparent; animation: spin 8s linear infinite; pointer-events: none; }
    .avatar-ring-1 { width: 170px; height: 170px; border-top-color: #ff6b9d; border-right-color: #c44cff; }
    .avatar-ring-2 { width: 155px; height: 155px; border-bottom-color: #ffd93d; border-left-color: #6bfff0; animation-direction: reverse; animation-duration: 6s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-divider { width: 60px; height: 3px; background: linear-gradient(90deg, #ff6b9d, #c44cff); border-radius: 2px; margin: 0 auto 28px; }
    .result-compliment { font-size: 1.1rem; line-height: 1.9; color: rgba(255,255,255,0.9); margin-bottom: 32px; }
    .result-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 32px; }
    .result-tag { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; color: rgba(255,255,255,0.6); }
    .result-footer { font-size: 0.8rem; color: rgba(255,255,255,0.3); margin-top: 10px; }
    .btn-retry { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 12px 32px; border-radius: 50px; font-size: 0.9rem; cursor: pointer; margin-top: 20px; transition: all 0.3s; }
    .btn-retry:hover { background: rgba(255,255,255,0.15); }
    .btn-share { background: linear-gradient(135deg, #ffd93d, #ff6b9d); border: none; color: #1a1a2e; font-size: 0.95rem; font-weight: 700; padding: 14px 36px; border-radius: 50px; cursor: pointer; margin-top: 12px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-share:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,217,61,0.4); }
    .sparkle { position: fixed; pointer-events: none; z-index: 0; animation: sparkleAnim 1.5s ease-out forwards; }
    @keyframes sparkleAnim { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(0); } }
    @media (max-width: 480px) { #page-start h1 { font-size: 1.8rem; } .question-card { padding: 28px 20px; } .result-type { font-size: 1.8rem; } }
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div id="page-start" class="page active">
  <div>
    <span class="hero-emoji">&#x1F9DE;</span>
    <h1>照照镜子测试</h1>
    <p class="subtitle">LOOK MIRROR TEST</p>
    <p class="desc">这不是一个评判你颜值的测试。<br>10道题，测出你在「社交自信」<br>和「自我感知」两个维度上的位置。<br><br>结果，可能会出乎你的意料。</p>
    <button class="btn-start" onclick="startTest()">开始测试 &#x2192;</button>
  </div>
</div>

<div id="page-question" class="page">
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="question-card">
    <div class="question-num" id="qNum">第 1 / 10 题</div>
    <div class="question-text" id="qText"></div>
    <div class="options" id="options"></div>
  </div>
</div>

<div id="page-result" class="page">
  <div class="result-card">
    <div class="result-badge">你的颜值人格报告</div>
    <div class="result-type" id="rType"></div>
    <div class="result-title" id="rTitle"></div>
    <div class="result-portrait">
      <div class="avatar-ring avatar-ring-1"></div>
      <div class="avatar-ring avatar-ring-2"></div>
      <img id="rPortrait" src="" alt="portrait">
    </div>
    <div class="result-divider"></div>
    <div class="result-compliment" id="rCompliment"></div>
    <div class="result-tags" id="rTags"></div>
    <button class="btn-share" onclick="exportShareCard()"><span>&#x1F4E4;</span> 发朋友圈炫耀一下</button>
    <div class="result-footer">照照镜子测试 &middot; LookMirror &copy; 2026</div>
  </div>
  <button class="btn-retry" onclick="retry()">再测一次 &#x1F504;</button>
</div>

<script>
var questions = [
  { q: "在陌生人多的场合，你的状态是？", opts: [
    { text: "稳得很，主动social", scoreA: 3, scoreB: 0 },
    { text: "还行，等别人来搭话", scoreA: 2, scoreB: 0 },
    { text: "尽量降低存在感", scoreA: 1, scoreB: 0 },
    { text: "想躲，想逃，想消失", scoreA: 1, scoreB: 0 }]},
  { q: "被人偷拍时，你的第一反应是？", opts: [
    { text: "笑一个，说不定能当我的素材", scoreA: 3, scoreB: 0 },
    { text: "无所谓，拍就拍呗", scoreA: 2, scoreB: 0 },
    { text: "偷拍？？给我看看拍成啥样了！", scoreA: 1, scoreB: 0 },
    { text: "（内心一紧）假装没发现", scoreA: 1, scoreB: 0 }]},
  { q: "你愿意在朋友圈发自己的素颜照吗？", opts: [
    { text: "当然，原图直出是态度", scoreA: 3, scoreB: 0 },
    { text: "看情况，不太夸张就行", scoreA: 2, scoreB: 0 },
    { text: "必须美颜滤镜全开才发", scoreA: 1, scoreB: 0 },
    { text: "基本不发，发也只发风景", scoreA: 1, scoreB: 0 }]},
  { q: "路上遇到熟人在拍照，你的反应是？", opts: [
    { text: "自然走过去抢镜", scoreA: 3, scoreB: 0 },
    { text: "等拍完再若无其事路过", scoreA: 2, scoreB: 0 },
    { text: "绕路走，假装没看见", scoreA: 1, scoreB: 0 },
    { text: "内心疯狂祈祷别被发现", scoreA: 1, scoreB: 0 }]},
  { q: "「你这张照片好好看！」——你的反应是？", opts: [
    { text: "谢谢！这是我本人诶", scoreA: 3, scoreB: 0 },
    { text: "谢谢（内心觉得确实还行）", scoreA: 2, scoreB: 0 },
    { text: "哪里哪里，你拍的角度好", scoreA: 2, scoreB: 0 },
    { text: "（狐疑）你确定？？", scoreA: 1, scoreB: 0 }]},
  { q: "早上照镜子，你一般会？", opts: [
    { text: "忍不住多看两眼（真不错）", scoreA: 0, scoreB: 3 },
    { text: "还行，收拾一下出门", scoreA: 0, scoreB: 2 },
    { text: "快速扫一眼，不敢细看", scoreA: 0, scoreB: 1 },
    { text: "……这是我？今天配额用完了", scoreA: 0, scoreB: 1 }]},
  { q: "用三个词形容自己的长相，你会说？", opts: [
    { text: "自信、特别、够用了", scoreA: 0, scoreB: 3 },
    { text: "耐看、还行、有记忆点", scoreA: 0, scoreB: 2 },
    { text: "普通、平凡、路人甲", scoreA: 0, scoreB: 1 },
    { text: "不要问我，说了怕挨打", scoreA: 0, scoreB: 1 }]},
  { q: "看到自己被朋友拍到的照片，你的反应是？", opts: [
    { text: "这角度绝了，比自拍还好看", scoreA: 0, scoreB: 3 },
    { text: "能接受，跟平时差不多", scoreA: 0, scoreB: 2 },
    { text: "我平时不长这样吧？？", scoreA: 0, scoreB: 1 },
    { text: "我不听我不听我不听", scoreA: 0, scoreB: 1 }]},
  { q: "照镜子时，你对自己长相的期待是？", opts: [
    { text: "差不多就行，反正我也不差", scoreA: 0, scoreB: 3 },
    { text: "稍微收拾一下就能出门", scoreA: 0, scoreB: 2 },
    { text: "如果能再帅/美一点就好了", scoreA: 0, scoreB: 1 },
    { text: "不敢有期待，活着就好", scoreA: 0, scoreB: 1 }]},
  { q: "面对「你长得真好看」这种夸奖，你的内心是？", opts: [
    { text: "嗯，我知道（微微点头）", scoreA: 0, scoreB: 3 },
    { text: "谢谢，客气客气", scoreA: 0, scoreB: 2 },
    { text: "？？你是不是在内涵我", scoreA: 0, scoreB: 1 },
    { text: "（表面淡定，内心已经在发奖状）", scoreA: 0, scoreB: 2 }]}
];

var results = {
  'low-low':   { type: "独处修行者", title: "内向型自省者，你在自己的世界里闪闪发光", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Le_Penseur_by_Rodin_%28Kunsthalle_Bielefeld%29_2014-04-10.JPG/330px-Le_Penseur_by_Rodin_%28Kunsthalle_Bielefeld%29_2014-04-10.JPG" },
  'low-mid':   { type: "静水深潭型", title: "温和接纳型，把平凡活成了深沉的力量", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/330px-1665_Girl_with_a_Pearl_Earring.jpg" },
  'low-high':  { type: "治愈温暖型", title: "慢性子自信，不张扬却让人忍不住靠近", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg/400px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg" },
  'mid-low':   { type: "进击小透明", title: "社交焦虑中的奋斗者，正在走向更舒展的自己", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/330px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg" },
  'mid-mid':   { type: "靠谱本谱型", title: "真实系玩家，好看不好看我都在认真做自己", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Jean-Baptiste-Camille_Corot_053.jpg/400px-Jean-Baptiste-Camille_Corot_053.jpg" },
  'mid-high':  { type: "氛围感大师", title: "慢热发光的你，自带让人上瘾的气场", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/Lady_with_an_Ermine_-_Leonardo_da_Vinci_%28adjusted_levels%29.jpg/330px-Lady_with_an_Ermine_-_Leonardo_da_Vinci_%28adjusted_levels%29.jpg" },
  'high-low':  { type: "反焦虑天花板", title: "你已经跳出了颜值的评判体系，完全做自己", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/La_Libert%C3%A9_guidant_le_peuple_-_Eug%C3%A8ne_Delacroix_-_Mus%C3%A9e_du_Louvre_Peintures_RF_129_-_apr%C3%A8s_restauration_2024.jpg/400px-La_Libert%C3%A9_guidant_le_peuple_-_Eug%C3%A8ne_Delacroix_-_Mus%C3%A9e_du_Louvre_Peintures_RF_129_-_apr%C3%A8s_restauration_2024.jpg" },
  'high-mid':  { type: "耐看雅典型", title: "越看越上头的款，你是时间检验过的经典", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Mattei_Athena_Louvre_Ma530_n2.jpg/330px-Mattei_Athena_Louvre_Ma530_n2.jpg" },
  'high-high': { type: "天赋弥尔顿型", title: "老天爷亲手打造的孤品，请珍惜限量版的脸", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Apollo_del_Belvedere.jpg/330px-Apollo_del_Belvedere.jpg" }
};

var compliments = {
  'low-low':   "你不喜欢主动出击，但你的内心有一个完整的宇宙。别人看不到你的光芒，但你自己知道。你不需要靠外表来证明什么，因为你早就跳出了这个评判体系。",
  'low-mid':   "你的好看是静水深潭那种——表面波澜不惊，底下是别人看不见的深度。你不炫耀、不解释，但懂的人自然会被你吸引。这是只有时间才能沉淀出来的高级感。",
  'low-high':  "你是那种让人忍不住想靠近的类型——没有攻击性，但有温度。你的存在本身就像一杯温热的茶，喝下去，整个世界都柔和了一点。你不需要改变什么，保持就好。",
  'mid-low':   "你正在路上。从不太自信到完全接纳自己，这条路你走得踏实。每一次「还敢发自拍」的小进步，都在把自己推向更舒展的版本。",
  'mid-mid':   "你是那种真实到可爱的人——不装、不演、不P图，但也不炫。你接受镜子里那个人，不捧杀也不贬低。这份平常心，是最高级的颜值。",
  'mid-high':  "你不是那种第一眼就炸裂的类型，但你是那种——看完一眼想看第二眼、看到天亮都不腻的类型。你的美是陈年老酒，是越品越有味的禁书。",
  'high-low':  "你已经完全跳出了颜值的游戏规则。你不在别人的评分体系里跑，你根本不跟她们同场竞技。这叫什么？这叫——活透了。",
  'high-mid':  "你的好看是建筑奇迹那种——经得起时间、角度、挑剔的所有考验。雅典娜不是因为张扬才成为女神，你也是。经典从来不需要解释。",
  'high-high': "你的脸是老天爷想打造精品时不小心做出来的孤品。你不是在照镜子，是镜子在庆幸能框住你。请珍惜，这是限量版。"
};

var tagsMap = {
  'low-low':   ["独处型", "内省者", "自我接纳", "佛系"],
  'low-mid':   ["静水深", "深沉型", "有故事", "不张扬"],
  'low-high':  ["治愈系", "温暖型", "让人安心", "有温度"],
  'mid-low':   ["潜力股", "成长型", "慢慢变好", "勇敢"],
  'mid-mid':   ["真实系", "不装", "稳", "生活家"],
  'mid-high':  ["氛围感", "慢热", "上头", "回味型"],
  'high-low':  ["反内卷", "通透", "自我", "觉醒"],
  'high-mid':  ["经典款", "耐看", "雅典", "稳定输出"],
  'high-high': ["天赋型", "老天爷赏饭", "限量版", "孤品"]
};

var currentQ = 0;
var scoreA = 0;
var scoreB = 0;

function startTest() {
  currentQ = 0; scoreA = 0; scoreB = 0;
  showPage('question'); renderQuestion();
}

function getDimLevel(score) {
  if (score <= 8) return 'low';
  if (score <= 11) return 'mid';
  return 'high';
}

function renderQuestion() {
  var q = questions[currentQ];
  document.getElementById('qNum').textContent = '第 ' + (currentQ + 1) + ' / ' + questions.length + ' 题';
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progress').style.width = (currentQ / questions.length * 100) + '%';
  var optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  q.opts.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.onclick = function() { selectOption(opt.scoreA, opt.scoreB); };
    optsEl.appendChild(btn);
  });
}

function selectOption(sA, sB) {
  scoreA += sA; scoreB += sB; currentQ++;
  if (currentQ < questions.length) { renderQuestion(); }
  else { showResult(); }
}

function showResult() {
  document.getElementById('progress').style.width = '100%';
  setTimeout(function() { showPage('result'); renderResult(); createSparkles(); }, 400);
}

function renderResult() {
  var key = getDimLevel(scoreA) + '-' + getDimLevel(scoreB);
  var r = results[key];
  document.getElementById('rType').textContent = r.type;
  document.getElementById('rTitle').textContent = r.title;
  document.getElementById('rPortrait').src = r.img;
  document.getElementById('rCompliment').textContent = compliments[key];
  var tagsEl = document.getElementById('rTags');
  tagsEl.innerHTML = '';
  tagsMap[key].forEach(function(tag) {
    var span = document.createElement('span');
    span.className = 'result-tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  });
}

function createSparkles() {
  var emojis = ['&#x2728;', '&#x1F4AB;', '&#x2B50;', '&#x1F31F;', '&#x1F4A5;', '&#x1F98B;', '&#x1F338;', '&#x1F340;'];
  for (var i = 0; i < 20; i++) {
    (function(j) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'sparkle';
        el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = Math.random() * 100 + 'vh';
        el.style.fontSize = (Math.random() * 20 + 12) + 'px';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1500);
      }, j * 80);
    })(i);
  }
}

function retry() { showPage('start'); }

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
}

function wrapText(ctx, text, maxWidth, fontSize) {
  ctx.font = fontSize + 'px PingFang SC, Microsoft YaHei';
  var words = text.split('');
  var line = '';
  var lines = [];
  for (var i = 0; i < words.length; i++) {
    var testLine = line + words[i];
    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
      lines.push(line); line = words[i];
    } else { line = testLine; }
  }
  if (line) lines.push(line);
  return lines;
}

function exportShareCard() {
  var key = getDimLevel(scoreA) + '-' + getDimLevel(scoreB);
  var r = results[key];
  var PAD = 80;

  var canvas = document.createElement('canvas');
  canvas.width = 800; canvas.height = 1000;
  var ctx = canvas.getContext('2d');

  // Background
  var grad = ctx.createLinearGradient(0, 0, 800, 1000);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f0f1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 800, 1000);

  // Orbs
  var c1 = ctx.createRadialGradient(60, 100, 5, 60, 100, 260);
  c1.addColorStop(0, 'rgba(255,107,157,0.22)');
  c1.addColorStop(1, 'rgba(255,107,157,0)');
  ctx.fillStyle = c1;
  ctx.beginPath(); ctx.arc(60, 100, 260, 0, Math.PI * 2); ctx.fill();

  var c2 = ctx.createRadialGradient(740, 870, 5, 740, 870, 260);
  c2.addColorStop(0, 'rgba(196,76,255,0.22)');
  c2.addColorStop(1, 'rgba(196,76,255,0)');
  ctx.fillStyle = c2;
  ctx.beginPath(); ctx.arc(740, 870, 260, 0, Math.PI * 2); ctx.fill();

  // Top label
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '20px PingFang SC, Microsoft YaHei';
  ctx.textAlign = 'center';
  ctx.fillText('\u7167\u7167\u955c\u5b50\u6d4b\u8bd5 \u00b7 \u989c\u503c\u4eba\u683c\u62a5\u544a', 400, 80);

  // Portrait circle
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var px = 400, py = 220, pr = 100;
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.shadowColor = 'rgba(196,76,255,0.5)';
    ctx.shadowBlur = 30;
    ctx.drawImage(img, px - pr, py - pr, pr * 2, pr * 2);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.stroke();

    // Type name
    ctx.font = 'bold 58px PingFang SC, Microsoft YaHei';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(r.type, 400, 365);

    // Subtitle
    ctx.font = '23px PingFang SC, Microsoft YaHei';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(r.title, 400, 415);

    // Divider
    var dg = ctx.createLinearGradient(PAD + 40, 0, 800 - PAD - 40, 0);
    dg.addColorStop(0, 'rgba(255,107,157,0)');
    dg.addColorStop(0.5, 'rgba(255,107,157,0.6)');
    dg.addColorStop(1, 'rgba(196,76,255,0)');
    ctx.strokeStyle = dg;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(PAD + 40, 445); ctx.lineTo(800 - PAD - 40, 445); ctx.stroke();

    // Tags
    var tags = tagsMap[key];
    ctx.font = '19px PingFang SC, Microsoft YaHei';
    var totalTagW = 0;
    for (var ti = 0; ti < tags.length; ti++) { totalTagW += ctx.measureText(tags[ti]).width + 50; }
    var tagX = 400 - totalTagW / 2;
    for (var tj = 0; tj < tags.length; tj++) {
      var tag = tags[tj];
      var tw = ctx.measureText(tag).width + 36;
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.roundRect(tagX, 465, tw, 38, 19); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.textAlign = 'center';
      ctx.fillText(tag, tagX + tw / 2, 492);
      tagX += tw + 14;
    }

    // Compliment text
    var comp = compliments[key];
    var compLines = wrapText(ctx, comp, 640, 24);
    var ly = 545;
    for (var ci = 0; ci < Math.min(compLines.length, 5) ; ci++) {
      ctx.font = '24px PingFang SC, Microsoft YaHei';
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.textAlign = 'center';
      ctx.fillText(compLines[ci], 400, ly);
      ly += 44;
    }

    // Watermark
    ctx.font = '17px PingFang SC, Microsoft YaHei';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillText('\u7167\u7167\u955c\u5b50\u6d4b\u8bd5 \u00b7 LookMirror \u00a9 2026', 400, 960);

    // Download
    var link = document.createElement('a');
    link.href = canvas.toDataURL("image/png");
    link.click();
  };
  img.onerror = function() {
    var px = 400, py = 220, pr = 100;
    ctx.font = "100px serif";
    ctx.fillText("🎭", 400, 240);
    ctx.font = "bold 58px PingFang SC, Microsoft YaHei";
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.fillText(r.type, 400, 365);
    ctx.fillText(r.title, 400, 415);
    var comp = compliments[key];
    var compLines = wrapText(ctx, comp, 640, 24);
    var ly = 545;
    for (var ci = 0; ci < Math.min(compLines.length, 5); ci++) {
      ctx.font = "24px PingFang SC, Microsoft YaHei";
      ctx.fillStyle = "rgba(255,255,255,0.78)";
      ctx.textAlign = "center";
      ctx.fillText(compLines[ci], 400, ly);
      ly += 44;
    }
  };
  img.src = r.img;
}
</script>
